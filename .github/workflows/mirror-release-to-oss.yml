name: Mirror Release Assets to Aliyun OSS

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to mirror, for example v0.5.0rc3
        required: true

permissions:
  contents: read

concurrency:
  group: oss-release-mirror-${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}
  cancel-in-progress: false

env:
  OSSUTIL_VERSION: "2.3.0"
  OSSUTIL_ZIP: ossutil-2.3.0-linux-amd64.zip
  OSSUTIL_SHA256: 3ae4d9fc85a7a6e9f5654d1599766f1a3a42a3692870887b5ae9338d582ef65a

jobs:
  mirror-release-assets:
    name: Mirror release assets to Aliyun OSS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ALIYUN_OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET }}
      ALIYUN_OSS_PREFIX: ${{ vars.ALIYUN_OSS_PREFIX }}
      OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
      OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
      OSS_REGION: ${{ vars.ALIYUN_OSS_REGION }}
      OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT }}
      OSS_ADDRESSING_STYLE: ${{ vars.ALIYUN_OSS_ADDRESSING_STYLE }}
    steps:
      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${MANUAL_RELEASE_TAG}"
          else
            tag="${RELEASE_TAG}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+[A-Za-z0-9._+-]*$ ]]; then
            echo "Release tag must look like v0.5.0rc3 or v0.5.0: ${tag}" >&2
            exit 1
          fi
          printf 'tag=%s\n' "${tag}" >> "${GITHUB_OUTPUT}"

      - name: Validate OSS configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [[ -n "${ALIYUN_OSS_BUCKET}" ]] || missing+=("vars.ALIYUN_OSS_BUCKET")
          [[ -n "${OSS_REGION}" ]] || missing+=("vars.ALIYUN_OSS_REGION")
          [[ -n "${OSS_ACCESS_KEY_ID}" ]] || missing+=("secrets.ALIYUN_OSS_ACCESS_KEY_ID")
          [[ -n "${OSS_ACCESS_KEY_SECRET}" ]] || missing+=("secrets.ALIYUN_OSS_ACCESS_KEY_SECRET")
          if (( ${#missing[@]} )); then
            printf 'Missing required OSS mirror configuration:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

          prefix="${ALIYUN_OSS_PREFIX:-releases}"
          prefix="${prefix#/}"
          prefix="${prefix%/}"
          if [[ -z "${prefix}" ]]; then
            prefix="releases"
          fi
          echo "ALIYUN_OSS_PREFIX_NORMALIZED=${prefix}" >> "${GITHUB_ENV}"

          endpoint_host="${OSS_ENDPOINT#http://}"
          endpoint_host="${endpoint_host#https://}"
          endpoint_host="${endpoint_host%%/*}"
          addressing_style="${OSS_ADDRESSING_STYLE:-}"
          if [[ -z "${addressing_style}" ]]; then
            if [[ -n "${endpoint_host}" && ! "${endpoint_host}" =~ (^|[.])aliyuncs[.]com$ ]]; then
              addressing_style="cname"
            else
              addressing_style="virtual"
            fi
          fi
          case "${addressing_style}" in
            virtual|path|cname) ;;
            *)
              echo "ALIYUN_OSS_ADDRESSING_STYLE must be virtual, path, or cname: ${addressing_style}" >&2
              exit 1
              ;;
          esac
          echo "OSS_ADDRESSING_STYLE_NORMALIZED=${addressing_style}" >> "${GITHUB_ENV}"

      - name: Download GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir release-assets \
            --clobber
          asset_count="$(find release-assets -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [[ "${asset_count}" == "0" ]]; then
            echo "No GitHub Release assets were downloaded for ${TAG}" >&2
            exit 1
          fi
          find release-assets -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Verify release checksums
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f release-assets/SHA256SUMS ]]; then
            echo "Missing SHA256SUMS in downloaded release assets" >&2
            exit 1
          fi
          (cd release-assets && sha256sum --strict -c SHA256SUMS)
          python3 - <<'PY'
          from pathlib import Path

          root = Path("release-assets")
          checksum_file = root / "SHA256SUMS"
          expected = []
          hex_chars = set("0123456789abcdefABCDEF")

          for line_number, line in enumerate(checksum_file.read_text(encoding="utf-8").splitlines(), 1):
              if not line.strip():
                  continue
              try:
                  digest, name = line.split(None, 1)
              except ValueError as exc:
                  raise SystemExit(f"Invalid SHA256SUMS line {line_number}") from exc
              if len(digest) != 64 or any(char not in hex_chars for char in digest):
                  raise SystemExit(f"Invalid SHA256 digest on line {line_number}")
              if name.startswith("*"):
                  name = name[1:]
              path = Path(name)
              if not name or path.is_absolute() or len(path.parts) != 1 or ".." in path.parts:
                  raise SystemExit(f"Unsafe checksum filename on line {line_number}: {name}")
              if name == "SHA256SUMS":
                  raise SystemExit("SHA256SUMS must not list itself")
              expected.append(name)

          if not expected:
              raise SystemExit("SHA256SUMS does not list any release assets")

          actual = {path.name for path in root.iterdir() if path.is_file()}
          expected_set = set(expected)
          missing = sorted(expected_set - actual)
          extra = sorted(actual - expected_set - {"SHA256SUMS"})
          if missing:
              raise SystemExit("Missing checksummed release assets: " + ", ".join(missing))
          if extra:
              raise SystemExit("Release assets missing from SHA256SUMS: " + ", ".join(extra))

          (root / "CHECKSUMMED_ASSETS").write_text("\n".join(expected) + "\n", encoding="utf-8")
          PY

      - name: Install ossutil 2.0
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSLO "https://gosspublic.alicdn.com/ossutil/v2/${OSSUTIL_VERSION}/${OSSUTIL_ZIP}"
          echo "${OSSUTIL_SHA256}  ${OSSUTIL_ZIP}" | sha256sum -c -
          unzip -q "${OSSUTIL_ZIP}"
          sudo install -m 0755 "ossutil-${OSSUTIL_VERSION}-linux-amd64/ossutil" /usr/local/bin/ossutil
          ossutil version || ossutil --version || ossutil

      - name: Upload release assets to OSS
        env:
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          dest_prefix="oss://${ALIYUN_OSS_BUCKET}/${ALIYUN_OSS_PREFIX_NORMALIZED}/${TAG}"
          upload_asset() {
            local path="$1"
            local name="$2"
            ossutil cp --force --addressing-style "${OSS_ADDRESSING_STYLE_NORMALIZED}" \
              "${path}" "${dest_prefix}/${name}"
          }
          while IFS= read -r name; do
            [[ -n "${name}" ]] || continue
            upload_asset "release-assets/${name}" "${name}"
          done < release-assets/CHECKSUMMED_ASSETS
          upload_asset "release-assets/SHA256SUMS" "SHA256SUMS"
          ossutil ls --addressing-style "${OSS_ADDRESSING_STYLE_NORMALIZED}" "${dest_prefix}/"
